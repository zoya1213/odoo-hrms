<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo HRMS - Premium Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #f5f0f4 0%, #e2d7e5 50%, #d3c4d8 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .odoo-gradient {
            background: linear-gradient(135deg, #714B67 0%, #54374d 100%);
        }
        .text-glow {
            color: #714B67;
            text-shadow: 0 4px 12px rgba(113, 75, 103, 0.15);
        }
        .custom-ring:focus {
            border-color: #714B67;
            box-shadow: 0 0 0 4px rgba(113, 75, 103, 0.15);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative overflow-hidden">

    <div class="absolute -top-10 -left-10 w-96 h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
    <div class="absolute -bottom-10 -right-10 w-96 h-96 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse delay-700"></div>

    <div class="relative w-full max-w-md p-10 bg-white/75 backdrop-blur-xl rounded-3xl shadow-[0_25px_60px_-15px_rgba(113,75,103,0.12)] border border-white/60 transform transition-all duration-300 hover:scale-[1.005]">
        
        <div class="text-center mb-9">
            <h1 class="text-6xl font-black text-glow tracking-tighter select-none">odoo</h1>
            <div class="h-1 w-14 odoo-gradient mx-auto mt-4 rounded-full"></div>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-3.5">Human Resource Management</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
            
            <div>
                <label class="block text-gray-500 text-[11px] font-bold tracking-wider uppercase mb-2" for="employeeId">Employee ID</label>
                <input class="w-full px-4 py-3 bg-white/50 border border-gray-200/80 rounded-2xl focus:outline-none custom-ring transition-all duration-200 text-gray-800 placeholder-gray-400 text-sm" 
                       type="text" id="employeeId" placeholder="EX: EMP101" required>
            </div>

            <div>
                <label class="block text-gray-500 text-[11px] font-bold tracking-wider uppercase mb-2" for="email">Email Address</label>
                <input class="w-full px-4 py-3 bg-white/50 border border-gray-200/80 rounded-2xl focus:outline-none custom-ring transition-all duration-200 text-gray-800 placeholder-gray-400 text-sm" 
                       type="email" id="email" placeholder="zoya@company.com" required>
            </div>

            <div>
                <label class="block text-gray-500 text-[11px] font-bold tracking-wider uppercase mb-2" for="password">Password</label>
                <input class="w-full px-4 py-3 bg-white/50 border border-gray-200/80 rounded-2xl focus:outline-none custom-ring transition-all duration-200 text-gray-800 placeholder-gray-400 text-sm" 
                       type="password" id="password" placeholder="••••••••" required>
            </div>

            <div>
                <label class="block text-gray-500 text-[11px] font-bold tracking-wider uppercase mb-2" for="role">System Access Mode</label>
                <div class="relative">
                    <select class="w-full px-4 py-3 bg-white/50 border border-gray-200/80 rounded-2xl appearance-none focus:outline-none custom-ring transition-all duration-200 text-gray-700 cursor-pointer text-sm" id="role" required>
                        <option value="" disabled selected>Select execution flow...</option>
                        <option value="employee">Employee Dashboard View</option>
                        <option value="admin">HR Officer Management View</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400 text-xs">▼</div>
                </div>
            </div>

            <button class="w-full odoo-gradient text-white font-semibold py-3.5 px-6 rounded-2xl shadow-[0_12px_24px_-6px_rgba(113,75,103,0.3)] hover:shadow-[0_16px_32px_-6px_rgba(113,75,103,0.4)] hover:scale-[1.01] active:scale-[0.99] transition-all duration-200 cursor-pointer text-sm tracking-wide mt-3" 
                    type="submit">
                Initialize Session
            </button>
        </form>

        <div class="text-center mt-9 border-t border-gray-100/60 pt-6">
            <p class="text-[10px] text-gray-400 font-medium tracking-tight">&copy; 2026 Innovation HR Infrastructure Suite</p>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const role = document.getElementById('role').value;
            if (role === 'admin') {
                window.location.href = 'admin_dashboard.html';
            } else if (role === 'employee') {
                window.location.href = 'employee_dashboard.html';
            }
        }
    </script>
</body>
</html>
